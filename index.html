<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist E-Commerce Shop</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f9f9f9; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); padding: 15px; display: flex; flex-direction: column; justify-content: space-between; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; }
        .card h3 { margin: 10px 0 5px 0; font-size: 1.2rem; }
        .code { color: #666; font-size: 0.85rem; margin-bottom: 10px; }
        .price { font-size: 1.25rem; font-weight: bold; color: #e44d26; margin-bottom: 15px; }
        .btn { display: block; text-align: center; background: #25D366; color: white; padding: 10px; border-radius: 5px; text-decoration: none; font-weight: bold; }
        .btn.out { background: #ccc; pointer-events: none; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Our Products</h2>
    <div class="grid" id="shop-floor">Loading products...</div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzqusi-hAl3byuSgCdKyNJXfnxihn1LUsaSdm_3h5UXDWZBWe0fN_PatqPouMgFlamHdg/exec"; 
        const WHATSAPP_NUMBER = "917025070759"; 

        async function loadProducts() {
            try {
                const response = await fetch(API_URL);
                const products = await response.json();
                const container = document.getElementById('shop-floor');
                container.innerHTML = '';

                if (products.length === 0) {
                    container.innerText = "No products found.";
                    return;
                }

                products.forEach(item => {
                    // Temporarily allowing fallback if itemCode is broken on Google Sheet side
                    const displayCode = (item.itemCode && item.itemCode !== "#REF!") ? item.itemCode : "GEN-001";
                    const isOutOfStock = item.stock !== "" && parseInt(item.stock) <= 0;
                    
                    const message = encodeURIComponent(`Hello! I want to buy:\nProduct: ${item.name}\nItem Code: ${displayCode}\nPrice: ${item.price}`);
                    const waLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;

                    container.innerHTML += `
                        <div class="card">
                            <div>
                                <img src="${(item.image && item.image !== '#REF!') ? item.image : 'https://via.placeholder.com/250'}" alt="${item.name}">
                                <h3>${item.name}</h3>
                                <div class="code">Code: ${displayCode}</div>
                            </div>
                            <div>
                                <div class="price">₹${item.price}</div>
                                <a href="${waLink}" class="btn ${isOutOfStock ? 'out' : ''}" target="_blank">
                                    ${isOutOfStock ? 'Out of Stock' : 'Buy via WhatsApp'}
                                </a>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('shop-floor').innerText = "Error loading products.";
                console.error(error);
            }
        }

        loadProducts();
    </script>
</body>
</html>
